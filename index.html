<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HuertoAscoy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>HuertoAscoy</h1>
      <button id="logoutBtn" class="btn btn-secondary hidden">Cerrar sesion</button>
    </header>

    <main>
      <section id="authSection" class="card auth-card">
        <div class="tabs">
          <button class="tab active" data-tab="login">Iniciar sesion</button>
          <button class="tab" data-tab="register">Registro</button>
        </div>

        <form id="loginForm" class="form active">
          <h2>Login</h2>
          <label>Usuario <input id="loginUsername" required /></label>
          <label>Contrasena <input id="loginPassword" type="password" required /></label>
          <button class="btn" type="submit">Iniciar sesion</button>
        </form>

        <form id="registerForm" class="form">
          <h2>Registro</h2>
          <label>Nombre de usuario <input id="registerUsername" required /></label>
          <label>Contrasena <input id="registerPassword" type="password" required /></label>
          <label>Codigo secreto <input id="secretCode" required /></label>
          <button class="btn" type="submit">Crear cuenta</button>
        </form>
        <p id="authError" class="error"></p>
      </section>

      <section id="appSection" class="hidden">
        <div class="grid">
          <article class="card">
            <h2>Dashboard</h2>
            <div class="stats">
              <div><strong id="plantCount">0</strong><span>Numero de plantas</span></div>
              <div><strong id="pendingIrrigation">0</strong><span>Riegos pendientes</span></div>
              <div><strong id="lastActivity">-</strong><span>Ultima actividad</span></div>
            </div>
          </article>

          <article class="card">
            <div class="card-header">
              <h2>Clima en Ascoy - Cieza</h2>
              <button id="refreshWeatherBtn" class="btn btn-small">Actualizar</button>
            </div>
            <div id="weatherContent" class="weather">
              <div class="weather-main"><span id="weatherIcon">-</span><strong id="weatherState">Sin datos</strong></div>
              <p>Temperatura: <span id="weatherTemp">-</span></p>
              <p>Sensacion termica: <span id="weatherFeels">-</span></p>
              <p>Humedad: <span id="weatherHumidity">-</span></p>
              <p>Viento: <span id="weatherWind">-</span></p>
              <p>Fecha: <span id="weatherDate">-</span></p>
              <p id="weatherAdvice" class="advice">Configura tu API para ver recomendaciones.</p>
            </div>
          </article>
        </div>

        <article class="card">
          <div class="card-header">
            <h2>Mis Plantas</h2>
            <button id="showPlantFormBtn" class="btn btn-small">+ Anadir planta</button>
          </div>

          <form id="plantForm" class="form hidden">
            <label>Nombre <input id="plantName" required /></label>
            <label>Tipo <input id="plantType" required /></label>
            <label>Ubicacion <input id="plantLocation" required /></label>
            <label>Estado <input id="plantStatus" placeholder="Saludable, en crecimiento..." required /></label>
            <label>Frecuencia riego (dias) <input id="plantFrequency" type="number" min="1" value="2" required /></label>
            <button class="btn" type="submit">Guardar planta</button>
          </form>

          <div id="plantList" class="plant-list"></div>
        </article>
      </section>
    </main>

    <template id="plantTemplate">
      <article class="plant-item">
        <header>
          <h3 class="plant-name"></h3>
          <small class="plant-type"></small>
        </header>
        <p><strong>Ubicacion:</strong> <span class="plant-location"></span></p>
        <p><strong>Estado:</strong> <span class="plant-status"></span></p>
        <p><strong>Frecuencia de riego:</strong> cada <span class="plant-frequency"></span> dia(s)</p>
        <p class="auto-text"></p>

        <div class="actions">
          <button class="btn water-btn">Marcar como regado</button>
        </div>

        <details>
          <summary>Riego automatico</summary>
          <form class="auto-form">
            <label>
              Activar
              <input type="checkbox" class="auto-enabled" />
            </label>
            <label>Hora diaria <input type="time" class="auto-time" value="08:00" /></label>
            <label>Frecuencia
              <select class="auto-mode">
                <option value="daily">Diario</option>
                <option value="everyX">Cada X dias</option>
              </select>
            </label>
            <label class="auto-everyx-group hidden">Cada X dias <input type="number" min="1" value="2" class="auto-everyx" /></label>
            <button class="btn btn-small" type="submit">Guardar programacion</button>
          </form>
        </details>

        <details>
          <summary>Seguimiento visual (fotos)</summary>
          <input class="photo-input" type="file" accept="image/*" multiple />
          <div class="photo-timeline"></div>
        </details>

        <details>
          <summary>Diario</summary>
          <form class="journal-form">
            <label>Notas <textarea class="journal-notes" rows="2"></textarea></label>
            <label>Fertilizantes <input class="journal-fertilizer" /></label>
            <label>Problemas <input class="journal-issues" /></label>
            <label>Observaciones <textarea class="journal-observations" rows="2"></textarea></label>
            <button class="btn btn-small" type="submit">Guardar entrada</button>
          </form>
          <div class="journal-list"></div>
        </details>

        <details open>
          <summary>Historial de riegos</summary>
          <ul class="watering-history"></ul>
        </details>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
